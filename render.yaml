services:
  - type: web
    name: beer-game
    runtime: node
    buildCommand: npm install && cd client && npm install && npm run build && cd ../server && npm install && npm run build && cd ..
    startCommand: NODE_ENV=production node server/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        sync: false
